<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Invoice API</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="dashboard-body">
<div class="dashboard-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin" class="nav-item active"><span class="nav-icon">⊞</span> Overview</a>
      <a href="/dashboard" class="nav-item"><span class="nav-icon">←</span> Back to Dashboard</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div>
          <div class="user-name" id="sidebar-user-name">Admin</div>
          <div class="user-plan" style="color:#f97316">admin</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">← Logout</button>
    </div>
  </aside>

  <main class="dashboard-main">
    <div class="topbar">
      <h1 class="page-title">Admin Overview</h1>
    </div>
    <div class="page-content">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">Total Users</div></div>
        <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">Total Invoices</div></div>
        <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">Paid Invoices</div></div>
        <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">Total Revenue</div></div>
      </div>

      <!-- Plan breakdown -->
      <div class="card" id="plan-card" style="margin-bottom:20px;display:none">
        <div class="card-header"><span class="card-title">Plans</span></div>
        <div id="plan-breakdown" style="display:flex;gap:20px;flex-wrap:wrap"></div>
      </div>

      <!-- Users table -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Users</span>
          <input type="text" id="search" placeholder="Filter by email or name…" style="padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;width:240px">
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Invoices</th><th>Joined</th><th>Active</th><th>Actions</th></tr></thead>
            <tbody id="users-table">
              <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/static/js/api.js"></script>
<script>
requireAuth();
loadSidebarUser();

let allUsers = [];

async function loadStats() {
  try {
    const s = await API.get('/admin/stats');
    const cards = document.querySelectorAll('.stat-card .stat-value');
    cards[0].textContent = s.total_users;
    cards[1].textContent = s.total_invoices;
    cards[2].textContent = s.paid_invoices;
    cards[3].textContent = rupees(s.total_revenue);

    const pb = document.getElementById('plan-breakdown');
    pb.innerHTML = Object.entries(s.plan_breakdown).map(([p, c]) =>
      `<div style="text-align:center;padding:12px 24px;background:var(--bg);border-radius:var(--radius)">
        <div style="font-size:22px;font-weight:700">${c}</div>
        <div style="font-size:13px;color:var(--text-muted)">${p}</div>
      </div>`
    ).join('');
    document.getElementById('plan-card').style.display = '';
  } catch(e) { toast(e.message, 'error'); }
}

async function loadUsers() {
  try {
    allUsers = await API.get('/admin/users?limit=100');
    renderUsers(allUsers);
  } catch(e) {
    document.getElementById('users-table').innerHTML =
      `<tr><td colspan="7" style="color:var(--danger);padding:20px">Access denied — admin only</td></tr>`;
  }
}

function renderUsers(users) {
  const tbody = document.getElementById('users-table');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">No users found</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><strong>${u.name}</strong>${u.business_name ? `<div style="font-size:12px;color:var(--text-muted)">${u.business_name}</div>` : ''}</td>
      <td style="font-size:13px">${u.email}</td>
      <td>
        <select onchange="setPlan('${u.id}', this.value)" style="font-size:12px;padding:3px 6px;border:1px solid var(--border);border-radius:4px">
          ${['free','starter','pro'].map(p => `<option value="${p}" ${u.plan===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </td>
      <td>${u.invoice_count_this_month}</td>
      <td style="font-size:12px;color:var(--text-muted)">${fmtDate(u.created_at)}</td>
      <td>${u.is_active
        ? '<span class="badge badge-green">active</span>'
        : '<span class="badge badge-red">inactive</span>'}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="toggleActive('${u.id}',${!u.is_active})">
          ${u.is_active ? 'Deactivate' : 'Activate'}
        </button>
      </td>
    </tr>`).join('');
}

async function setPlan(userId, plan) {
  try {
    await API.patch(`/admin/users/${userId}/plan`, { plan });
    toast(`Plan updated to ${plan}`);
  } catch(e) { toast(e.message, 'error'); loadUsers(); }
}

async function toggleActive(userId, newState) {
  try {
    await API.patch(`/admin/users/${userId}/active`, { is_active: newState });
    toast(newState ? 'User activated' : 'User deactivated');
    loadUsers();
  } catch(e) { toast(e.message, 'error'); }
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderUsers(allUsers.filter(u =>
    u.email.toLowerCase().includes(q) || u.name.toLowerCase().includes(q)
  ));
});

loadStats();
loadUsers();
</script>
</body>
</html>
