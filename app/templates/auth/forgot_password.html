<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password — Invoice API</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="auth-body">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div class="auth-logo-name">Invoice API</div>
    </div>
    <h1 class="auth-title">Reset password</h1>
    <p class="auth-sub">Enter your email and we'll send a reset link</p>

    <div id="alert" class="alert"></div>
    <div id="success" class="alert alert-success" style="display:none"></div>

    <form id="form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btn">Send reset link</button>
    </form>

    <div class="auth-footer">
      <a href="/login">← Back to login</a>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  hideAlert('alert');
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const res = await API.post('/auth/forgot-password', { email: document.getElementById('email').value });
    document.getElementById('form').style.display = 'none';
    const s = document.getElementById('success');
    s.textContent = res.message;
    s.style.display = '';
  } catch (err) {
    showAlert('alert', err.message);
    btn.disabled = false; btn.textContent = 'Send reset link';
  }
});
</script>
</body>
</html>
