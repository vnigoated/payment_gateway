<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password — Invoice API</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="auth-body">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div class="auth-logo-name">Invoice API</div>
    </div>
    <h1 class="auth-title">Choose a new password</h1>

    <div id="alert" class="alert"></div>

    <form id="form">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btn">Set new password</button>
    </form>

    <div class="auth-footer"><a href="/login">← Back to login</a></div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('alert').textContent = 'Invalid reset link. Please request a new one.';
  document.getElementById('alert').style.display = '';
  document.getElementById('form').style.display = 'none';
}

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  hideAlert('alert');
  const pw = document.getElementById('password').value;
  const cf = document.getElementById('confirm').value;
  if (pw !== cf) { showAlert('alert', 'Passwords do not match'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Updating…';
  try {
    await API.post('/auth/reset-password', { token, new_password: pw });
    showAlert('alert', 'Password updated! Redirecting to login…', 'success');
    setTimeout(() => window.location.href = '/login', 2000);
  } catch (err) {
    showAlert('alert', err.message);
    btn.disabled = false; btn.textContent = 'Set new password';
  }
});
</script>
</body>
</html>
