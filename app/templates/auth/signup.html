<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up — Invoice API</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="auth-body">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div class="auth-logo-name">Invoice API</div>
    </div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Free — 5 invoices/month, no card needed</p>

    <div id="alert" class="alert alert-error"></div>

    <form id="signup-form">
      <div class="form-row">
        <div class="form-group">
          <label>Your name</label>
          <input type="text" id="name" placeholder="Rahul Sharma" required>
        </div>
        <div class="form-group">
          <label>Business name <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
          <input type="text" id="business_name" placeholder="Acme Pvt Ltd">
        </div>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create account →</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Login</a>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
  if (localStorage.getItem('token')) window.location.href = '/dashboard';

  document.getElementById('signup-form').addEventListener('submit', async e => {
    e.preventDefault();
    hideAlert('alert');
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Creating account…';

    try {
      const data = await API.post('/auth/signup', {
        name:          document.getElementById('name').value,
        business_name: document.getElementById('business_name').value || null,
        email:         document.getElementById('email').value,
        password:      document.getElementById('password').value,
      });
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/dashboard';
    } catch (err) {
      showAlert('alert', err.message);
      btn.disabled = false; btn.textContent = 'Create account →';
    }
  });
</script>
</body>
</html>
